name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          VISION_API_KEY: ${{ secrets.VISION_API_KEY }}
          VISION_BASE_URL: ${{ secrets.VISION_BASE_URL }}
          VISION_MODEL: ${{ secrets.VISION_MODEL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 98418c9d7c90c4f154ac693a809bb816
          command: pages deploy out/ --project-name=slide-studio --branch=main
